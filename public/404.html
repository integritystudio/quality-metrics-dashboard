<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: preserve path for client-side router
    var path = window.location.pathname;
    var query = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('spa-redirect', path + query + hash);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
