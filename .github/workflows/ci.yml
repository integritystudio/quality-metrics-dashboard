name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: doppler run --project integrity-studio --config dev -- npm test
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
