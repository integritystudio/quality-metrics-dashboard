name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent observability-toolkit
        uses: actions/checkout@v4
        with:
          repository: integritystudio/observability-toolkit
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build parent dist (required by dashboard scripts)
        run: npm ci && npm run build
      - name: Install dashboard dependencies
        run: cd dashboard && npm ci
      - name: Run dashboard tests
        run: cd dashboard && npm test

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent observability-toolkit
        uses: actions/checkout@v4
        with:
          repository: integritystudio/observability-toolkit
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
      - name: Build parent dist
        run: npm ci && npm run build
      - name: Install dashboard dependencies
        run: cd dashboard && npm ci
      - name: Build dashboard with env vars from Doppler
        run: |
          cd dashboard
          export VITE_API_URL=$(doppler secrets get DEV_WORKER_URL --project integrity-studio --config prd --plain)
          export VITE_AUTH0_DOMAIN=$(doppler secrets get VITE_AUTH0_DOMAIN --project integrity-studio --config prd --plain)
          export VITE_AUTH0_CLIENT_ID=$(doppler secrets get VITE_AUTH0_CLIENT_ID --project integrity-studio --config prd --plain)
          export VITE_AUTH0_AUDIENCE=$(doppler secrets get VITE_AUTH0_AUDIENCE --project integrity-studio --config prd --plain)
          npm run build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-worker:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent observability-toolkit
        uses: actions/checkout@v4
        with:
          repository: integritystudio/observability-toolkit
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
      - name: Build parent dist
        run: npm ci && npm run build
      - name: Install dashboard dependencies
        run: cd dashboard && npm ci
      - name: Build dashboard with env vars from Doppler
        run: |
          cd dashboard
          export VITE_API_URL=$(doppler secrets get DEV_WORKER_URL --project integrity-studio --config prd --plain)
          export VITE_AUTH0_DOMAIN=$(doppler secrets get VITE_AUTH0_DOMAIN --project integrity-studio --config prd --plain)
          export VITE_AUTH0_CLIENT_ID=$(doppler secrets get VITE_AUTH0_CLIENT_ID --project integrity-studio --config prd --plain)
          export VITE_AUTH0_AUDIENCE=$(doppler secrets get VITE_AUTH0_AUDIENCE --project integrity-studio --config prd --plain)
          npm run build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Deploy default worker
        run: cd dashboard && CLOUDFLARE_API_TOKEN=$(doppler secrets get CLOUDFLARE_WORKER_TOKEN --project integrity-studio --config prd --plain) npx wrangler deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Deploy production worker
        run: cd dashboard && CLOUDFLARE_API_TOKEN=$(doppler secrets get CLOUDFLARE_WORKER_TOKEN --project integrity-studio --config prd --plain) npx wrangler deploy --name quality-metrics-api
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
